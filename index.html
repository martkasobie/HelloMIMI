<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Łapanie Pomarańczy - Puntos de felicidad MIMI</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; 
            background-color: #87CEEB; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
        }
        canvas {
            display: block; 
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none; 
            text-shadow: 2px 2px 0px white, -2px -2px 0px white, 2px -2px 0px white, -2px 2px 0px white;
            z-index: 10;
        }

        /* --- STYL EKRANU STARTOWEGO --- */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(135, 206, 235, 0.95); /* Jasnoniebieski, lekko przezroczysty */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100; /* Zawsze na samym wierzchu */
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .startMessage {
            font-size: 26px;
            color: #333;
            max-width: 650px;
            margin-bottom: 40px;
            font-weight: bold;
            line-height: 1.5;
            text-shadow: 1px 1px 0px white;
        }
        #startButton {
            font-size: 32px;
            padding: 15px 50px;
            background-color: #FFA500; /* Pomarańczowy kolor przycisku */
            color: white;
            border: 3px solid #fff;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 6px 10px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        #startButton:active {
            transform: scale(0.95); /* Efekt wciśnięcia przycisku */
        }
    </style>
</head>
<body>
    
    <div id="startScreen">
        <p class="startMessage">"Know that the universe is listening to you. Whenever you feel down, I hope you return to these words to remember that, and let this app lift your spirits"</p>
        <button id="startButton">START</button>
    </div>

    <div id="ui">PUNTOS DE FELICIDAD MIMI: <span id="score">0</span></div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // --- ZMIENNE SYSTEMOWE GRY ---
        let happinessPoints = 0;
        let oranges = [];
        let lastTime = 0;
        let spawnTimer = 0;
        let gameRunning = false; // Zmienna sprawdzająca czy gra się rozpoczęła

        // --- KONTROLA ROZMIARU POSTACI I POMARAŃCZY ---
        const DESIRED_PLAYER_HEIGHT = 250; 
        const MIN_ORANGE_SIZE = 60;  
        const MAX_ORANGE_SIZE = 110; 

        // --- TWOJE WŁASNE GRAFIKI ---
        const orangeImage = new Image();
        orangeImage.src = "naranja1.png"; 

        const backgroundImage = new Image();
        backgroundImage.src = "sad2.png"; 

        const playerIdleImage = new Image();
        playerIdleImage.src = "SpriteWHOLE4.png";

        const playerWalkFrames = [];
        const walkFrameSources = [
            "SpriteWHOLE3.png",
            "SpriteWHOLE4.png",
            "SpriteWHOLE5.png"
        ];

        walkFrameSources.forEach((src, index) => {
            playerWalkFrames[index] = new Image();
            playerWalkFrames[index].src = src;
        });

        // --- POSTAĆ ---
        const player = {
            x: 0,
            y: 0,
            width: 0,  
            height: 0, 
            speed: 8,
            dx: 0,
            targetX: null,
            currentFrameIndex: 0,
            animationTimer: 0,
            animationDelay: 120, 
            isMoving: false
        };

        playerIdleImage.onload = function() {
            const aspectRatio = this.naturalWidth / this.naturalHeight;
            player.height = DESIRED_PLAYER_HEIGHT;
            player.width = player.height * aspectRatio;
            resize(); 
            draw(); // Rysujemy pierwszą klatkę przed startem gry (żeby było tło pod komunikatem)
        };

        backgroundImage.onload = function() {
            draw(); // Odświeżamy widok, gdy tło się załaduje
        };

        // --- RESPONSYWNOŚĆ ---
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            if (player.height > 0) {
                player.y = canvas.height - player.height - 40; 
            }
            
            if (player.x + player.width > canvas.width) {
                player.x = canvas.width - player.width;
            }
            if(!gameRunning) draw(); // Odświeżamy przy zmianie okna, nawet jeśli gra jeszcze nie wystartowała
        }
        window.addEventListener("resize", resize);
        
        player.x = window.innerWidth / 2;
        resize();

        // --- OBSŁUGA EKRANU STARTOWEGO ---
        const startScreen = document.getElementById("startScreen");
        const startButton = document.getElementById("startButton");

        startButton.addEventListener("click", () => {
            startScreen.style.display = "none"; // Ukrywa ekran startowy
            gameRunning = true; // Zmienia status gry
            
            // Rozpoczyna główną pętlę gry
            requestAnimationFrame((timestamp) => {
                lastTime = timestamp;
                gameLoop(timestamp);
            });
        });

        // --- STEROWANIE ---
        document.addEventListener("keydown", (e) => {
            if(!gameRunning) return; // Zablokuj sterowanie, gdy gra nie jest odpalona
            if (e.code === "ArrowLeft") player.dx = -player.speed;
            if (e.code === "ArrowRight") player.dx = player.speed;
            player.targetX = null;
        });
        document.addEventListener("keyup", (e) => {
            if(!gameRunning) return;
            if (e.code === "ArrowLeft" || e.code === "ArrowRight") player.dx = 0;
        });

        function handlePointerMove(e) {
            if(!gameRunning) return;
            e.preventDefault();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            player.targetX = clientX - (player.width / 2);
        }
        document.addEventListener("mousemove", handlePointerMove);
        document.addEventListener("touchmove", handlePointerMove, {passive: false});
        document.addEventListener("touchstart", handlePointerMove, {passive: false});
        
        document.addEventListener("touchend", () => { player.targetX = null; });
        document.addEventListener("mouseup", () => { player.targetX = null; });

        // --- LOGIKA GRY ---
        function spawnOrange() {
            const size = MIN_ORANGE_SIZE + Math.random() * (MAX_ORANGE_SIZE - MIN_ORANGE_SIZE);
            const randomX = Math.random() * (canvas.width - size);
            
            oranges.push({ x: randomX, y: -size, width: size, height: size, speed: 5 });
        }

        function update(deltaTime) {
            player.isMoving = false;

            if (player.targetX !== null) {
                let distanceToTarget = player.targetX - player.x;
                player.x += distanceToTarget * 0.15;

                if (Math.abs(distanceToTarget) > 1) {
                    player.isMoving = true;
                }
            } else if (player.dx !== 0) {
                player.x += player.dx;
                player.isMoving = true;
            }

            // --- System Animacji ---
            if (player.isMoving) {
                player.animationTimer += deltaTime;
                if (player.animationTimer >= player.animationDelay) {
                    player.currentFrameIndex = (player.currentFrameIndex + 1) % playerWalkFrames.length;
                    player.animationTimer = 0;
                }
            } else {
                player.currentFrameIndex = 0;
                player.animationTimer = 0;
            }

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            spawnTimer += deltaTime;
            if (spawnTimer > 800) {
                spawnOrange();
                spawnTimer = 0;
            }

            for (let i = 0; i < oranges.length; i++) {
                let orange = oranges[i];
                orange.y += orange.speed;

                if (orange.x < player.x + player.width &&
                    orange.x + orange.width > player.x &&
                    orange.y < player.y + player.height &&
                    orange.height + orange.y > player.y) {
                    
                    happinessPoints++;
                    scoreElement.innerText = happinessPoints;
                    
                    oranges.splice(i, 1);
                    i--;
                    continue;
                }

                if (orange.y > canvas.height) {
                    oranges.splice(i, 1);
                    i--;
                }
            }
        }

        // --- RYSOWANIE GRAFIKI ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.imageSmoothingEnabled = false; 

            // Rysowanie tła
            if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
                const canvasRatio = canvas.width / canvas.height;
                const imgRatio = backgroundImage.naturalWidth / backgroundImage.naturalHeight;
                
                let drawWidth, drawHeight, offsetX = 0, offsetY = 0;

                if (canvasRatio > imgRatio) {
                    drawWidth = canvas.width;
                    drawHeight = canvas.width / imgRatio; 
                    offsetY = canvas.height - drawHeight; 
                } else {
                    drawHeight = canvas.height;
                    drawWidth = canvas.height * imgRatio; 
                    offsetX = (canvas.width - drawWidth) / 2; 
                    offsetY = canvas.height - drawHeight; 
                }

                ctx.drawImage(backgroundImage, offsetX, offsetY, drawWidth, drawHeight);
            } else {
                ctx.fillStyle = "#87CEEB";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#32CD32";
                ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
            }

            // Postać
            let imageToDraw = player.isMoving ? playerWalkFrames[player.currentFrameIndex] : playerIdleImage;
            let isLoaded = imageToDraw && imageToDraw.complete && imageToDraw.naturalWidth > 0;

            if (isLoaded && player.width > 0 && player.height > 0) {
                ctx.drawImage(imageToDraw, player.x, player.y, player.width, player.height);
            } else {
                let tempHeight = DESIRED_PLAYER_HEIGHT;
                let tempWidth = tempHeight * 0.8;
                ctx.fillStyle = "#4682B4";
                ctx.fillRect(player.x + (tempWidth*0.1), player.y + (tempHeight*0.3), tempWidth * 0.8, tempHeight * 0.7);
                ctx.fillStyle = "#FFC0CB";
                ctx.fillRect(player.x + (tempWidth*0.2), player.y, tempWidth * 0.6, tempHeight * 0.3);
            }

            // Pomarańcze
            oranges.forEach(orange => {
                if (orangeImage.complete && orangeImage.naturalWidth > 0) {
                    ctx.drawImage(orangeImage, orange.x, orange.y, orange.width, orange.height);
                } else {
                    ctx.fillStyle = "#FFA500";
                    ctx.beginPath();
                    ctx.arc(orange.x + orange.width/2, orange.y + orange.height/2, orange.width/2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = "#228B22";
                    ctx.beginPath();
                    ctx.ellipse(orange.x + orange.width/2, orange.y + 5, 8, 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        // --- GŁÓWNA PĘTLA GRY ---
        function gameLoop(timestamp) {
            if(!gameRunning) return; // Zabezpieczenie, by pętla nie działała przed kliknięciem
            
            let deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            if (deltaTime > 100) deltaTime = 16; 

            update(deltaTime);
            draw();
            
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
