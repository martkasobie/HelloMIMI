<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Łapanie Pomarańczy - Puntos de felicidad MIMI</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; 
            background-color: #87CEEB; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
        }
        canvas {
            display: block; 
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none; 
            text-shadow: 2px 2px 0px white, -2px -2px 0px white, 2px -2px 0px white, -2px 2px 0px white;
            z-index: 10;
        }
        #missedText {
            font-size: 20px;
            color: #d32f2f; 
            text-shadow: 1px 1px 0px white, -1px -1px 0px white, 1px -1px 0px white, -1px 1px 0px white;
        }

        /* --- STYL EKRANU STARTOWEGO I GAME OVER --- */
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(155, 89, 182, 0.95); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100; 
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .startMessage {
            font-size: 26px;
            color: #ffffff; 
            max-width: 650px;
            margin-bottom: 20px;
            font-weight: bold;
            line-height: 1.5;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        /* POPRAWKA: Blok tekstu dedykowany specjalnie dla rankingu */
        #rankingText {
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            color: #FFE4E1; /* Piękny jasnoróżowy kolor na fioletowym tle */
            max-width: 580px;
            margin-top: 10px;
            margin-bottom: 40px;
            line-height: 1.6;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            display: block; /* Gwarancja, że element jest widoczny */
        }

        .gameButton {
            font-size: 32px;
            padding: 15px 50px;
            background-color: #FF69B4; 
            color: white;
            border: 3px solid #fff;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 6px 10px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .gameButton:active {
            transform: scale(0.95); 
        }

        @media (max-width: 600px) {
            #ui { font-size: 22px; top: 15px; left: 15px; }
            #missedText { font-size: 18px; }
            .startMessage { font-size: 22px; padding: 0 10px; margin-bottom: 15px; }
            #rankingText { font-size: 19px; max-width: 90%; margin-bottom: 30px; }
            .gameButton { font-size: 24px; padding: 15px 35px; }
        }
    </style>
</head>
<body>
    
    <div id="startScreen">
        <p class="startMessage">"Know that the universe is listening to you. Whenever you feel down, I hope you return to these words to remember that, and let this app lift your spirits"</p>
        <button id="startButton" class="gameButton">START</button>
    </div>

    <div id="gameOverScreen" style="display: none;">
        <p class="startMessage" style="color: #FFB6C1; font-size: 38px; text-shadow: 2px 2px 0px #000; margin-bottom: 5px;">FIN DEL JUEGO</p>
        <p class="startMessage" id="finalScoreText">Puntos obtenidos: 0</p>
        <div id="rankingText"></div>
        <button id="restartButton" class="gameButton">VOLVER A JUGAR</button>
    </div>

    <div id="ui">
        PUNTOS DE FELICIDAD MIMI: <span id="score">0</span><br>
        <span id="missedText">Naranjas perdidas: <span id="missedCount">0</span>/2</span>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const missedCountElement = document.getElementById("missedCount");
        const finalScoreText = document.getElementById("finalScoreText");
        const rankingText = document.getElementById("rankingText");

        let happinessPoints = 0;
        let missedOranges = 0; 
        let fallingItems = []; 
        let lastTime = 0;
        let spawnTimer = 0;
        let gameRunning = false; 
        let isDragging = false;

        // --- GRAFIKI ---
        const orangeImage = new Image();
        orangeImage.src = "naranja1.png"; 

        const backgroundImage = new Image();
        backgroundImage.src = "sad2.png"; 

        const playerIdleImage = new Image();
        playerIdleImage.src = "SpriteWHOLE4.png";

        const playerWalkFrames = [];
        const walkFrameSources = ["SpriteWHOLE3.png", "SpriteWHOLE4.png", "SpriteWHOLE5.png"];

        walkFrameSources.forEach((src, index) => {
            playerWalkFrames[index] = new Image();
            playerWalkFrames[index].src = src;
        });

        const leafImages = [];
        const leafSources = ["LISTKI.png", "listek1.png", "listek2.png"];
        
        leafSources.forEach((src, index) => {
            leafImages[index] = new Image();
            leafImages[index].src = src;
        });

        // --- POSTAĆ ---
        const player = {
            x: 0,
            y: 0,
            width: 0,  
            height: 0, 
            speed: 0, 
            dx: 0,
            targetX: null,
            currentFrameIndex: 0,
            animationTimer: 0,
            animationDelay: 120, 
            isMoving: false
        };

        playerIdleImage.onload = function() {
            resize(); 
            draw(); 
        };

        backgroundImage.onload = function() {
            draw(); 
        };

        // --- INTELIGENTNA RESPONSYWNOŚĆ ---
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let aspectRatio = 0.8; 
            if (playerIdleImage.complete && playerIdleImage.naturalHeight > 0) {
                aspectRatio = playerIdleImage.naturalWidth / playerIdleImage.naturalHeight;
            }

            let newHeight = Math.min(canvas.height * 0.38, 420);
            let newWidth = newHeight * aspectRatio;

            if (newWidth > canvas.width * 0.40) {
                newWidth = canvas.width * 0.40;
                newHeight = newWidth / aspectRatio;
            }

            player.height = newHeight;
            player.width = newWidth;
            player.speed = canvas.width * 0.015; 

            if (player.height > 0) {
                player.y = canvas.height - player.height - (canvas.height * 0.05); 
            }
            
            if (player.x + player.width > canvas.width) {
                player.x = canvas.width - player.width;
            }
            
            if(!gameRunning) draw(); 
        }
        window.addEventListener("resize", resize);
        
        player.x = window.innerWidth / 2;
        resize();

        // --- OBSŁUGA EKRANÓW ---
        const startScreen = document.getElementById("startScreen");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const startButton = document.getElementById("startButton");
        const restartButton = document.getElementById("restartButton");

        function startGame() {
            startScreen.style.display = "none"; 
            gameOverScreen.style.display = "none";
            
            happinessPoints = 0;
            missedOranges = 0;
            fallingItems = [];
            spawnTimer = 0;
            player.targetX = null;
            isDragging = false;
            
            scoreElement.innerText = happinessPoints;
            missedCountElement.innerText = missedOranges;
            
            gameRunning = true; 
            
            requestAnimationFrame((timestamp) => {
                lastTime = timestamp;
                gameLoop(timestamp);
            });
        }

        function gameOver() {
            gameRunning = false;
            finalScoreText.innerText = "Puntos obtenidos: " + happinessPoints;
            
            // AKTUALIZACJA: Logika wstrzykiwania tekstu działa teraz poprawnie z nowym CSS
            let message = "";
            if (happinessPoints < 100) {
                message = "¡Ánimo! Una pequeña chispa de alegría está por comenzar.";
            } else if (happinessPoints >= 100 && happinessPoints <= 299) {
                message = "Media sonrisa tímida. La comisura de los labios tiembla. El personaje ha notado que el mundo no es tan malo.";
            } else if (happinessPoints >= 300 && happinessPoints <= 599) {
                message = "Sonrisa sincera. La alegría es plena y visible. ¡Los ojos empiezan a brillar!";
            } else { 
                message = "¡Resplandeces! Eres un sol andante. Una sonrisa de oreja a oreja, y el mundo alrededor empieza a volverse colorido.";
            }
            
            rankingText.innerText = message;
            gameOverScreen.style.display = "flex";
        }

        startButton.addEventListener("click", startGame);
        restartButton.addEventListener("click", startGame);

        // --- STEROWANIE ---
        function isTouchingPlayer(clickX) {
            return (clickX >= player.x && clickX <= player.x + player.width);
        }

        document.addEventListener("mousedown", (e) => {
            if(!gameRunning) return;
            if (isTouchingPlayer(e.clientX)) {
                isDragging = true;
            }
        });

        document.addEventListener("touchstart", (e) => {
            if(!gameRunning) return;
            let touchX = e.touches[0].clientX;
            if (isTouchingPlayer(touchX)) {
                isDragging = true;
            }
        }, {passive: false});

        document.addEventListener("mousemove", (e) => {
            if(!gameRunning) return;
            if (isDragging) {
                player.targetX = e.clientX - (player.width / 2);
            }
        });

        document.addEventListener("touchmove", (e) => {
            if(!gameRunning) return;
            if (isDragging) {
                e.preventDefault(); 
                player.targetX = e.touches[0].clientX - (player.width / 2);
            }
        }, {passive: false});

        document.addEventListener("mouseup", () => {
            isDragging = false;
            player.targetX = null;
        });
        document.addEventListener("touchend", () => {
            isDragging = false;
            player.targetX = null;
        });

        document.addEventListener("keydown", (e) => {
            if(!gameRunning) return; 
            if (e.code === "ArrowLeft") player.dx = -player.speed;
            if (e.code === "ArrowRight") player.dx = player.speed;
            player.targetX = null;
        });
        document.addEventListener("keyup", (e) => {
            if(!gameRunning) return;
            if (e.code === "ArrowLeft" || e.code === "ArrowRight") player.dx = 0;
        });


        // --- LOGIKA GRY ---
        function spawnItem() {
            let minSize = canvas.width * 0.11; 
            let maxSize = canvas.width * 0.15; 

            minSize = Math.max(Math.min(minSize, 77), 53); 
            maxSize = Math.max(Math.min(maxSize, 132), 80);

            const size = minSize + Math.random() * (maxSize - minSize);
            const randomX = Math.random() * (canvas.width - size);
            
            const speed = canvas.height * 0.0085 + (Math.random() * 3); 
            
            const isLeaf = Math.random() < 0.60;
            let itemType = isLeaf ? 'leaf' : 'orange';
            let specificImage = null;

            if (isLeaf) {
                specificImage = leafImages[Math.floor(Math.random() * leafImages.length)];
            }

            fallingItems.push({ 
                x: randomX, 
                y: -size, 
                width: size, 
                height: size, 
                speed: speed,
                type: itemType,
                img: specificImage
            });
        }

        function update(deltaTime) {
            player.isMoving = false;

            if (player.targetX !== null) {
                let distanceToTarget = player.targetX - player.x;
                player.x += distanceToTarget * 0.40;

                if (Math.abs(distanceToTarget) > 1) {
                    player.isMoving = true;
                }
            } else if (player.dx !== 0) {
                player.x += player.dx;
                player.isMoving = true;
            }

            if (player.isMoving) {
                player.animationTimer += deltaTime;
                if (player.animationTimer >= player.animationDelay) {
                    player.currentFrameIndex = (player.currentFrameIndex + 1) % playerWalkFrames.length;
                    player.animationTimer = 0;
                }
            } else {
                player.currentFrameIndex = 0;
                player.animationTimer = 0;
            }

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            spawnTimer += deltaTime;
            if (spawnTimer > 700) {
                spawnItem();
                spawnTimer = 0;
            }

            for (let i = 0; i < fallingItems.length; i++) {
                let item = fallingItems[i];
                item.y += item.speed;

                // Kolizja z graczem
                if (item.x < player.x + player.width &&
                    item.x + item.width > player.x &&
                    item.y < player.y + player.height &&
                    item.height + item.y > player.y) {
                    
                    if (item.type === 'orange') {
                        happinessPoints++;
                    } else if (item.type === 'leaf') {
                        happinessPoints--;
                        if (happinessPoints < 0) happinessPoints = 0;
                    }

                    scoreElement.innerText = happinessPoints;
                    
                    fallingItems.splice(i, 1);
                    i--;
                    continue;
                }

                // Przedmiot spada poza ekran na dole
                if (item.y > canvas.height) {
                    if (item.type === 'orange') {
                        missedOranges++;
                        missedCountElement.innerText = missedOranges;
                        
                        if (missedOranges >= 2) {
                            gameOver();
                        }
                    }
                    
                    fallingItems.splice(i, 1);
                    i--;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.imageSmoothingEnabled = false; 

            // Rysowanie tła
            if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
                const canvasRatio = canvas.width / canvas.height;
                const imgRatio = backgroundImage.naturalWidth / backgroundImage.naturalHeight;
                
                let drawWidth, drawHeight, offsetX = 0, offsetY = 0;

                if (canvasRatio > imgRatio) {
                    drawWidth = canvas.width;
                    drawHeight = canvas.width / imgRatio; 
                    offsetY = canvas.height - drawHeight; 
                } else {
                    drawHeight = canvas.height;
                    drawWidth = canvas.height * imgRatio; 
                    offsetX = (canvas.width - drawWidth) / 2; 
                    offsetY = canvas.height - drawHeight; 
                }

                ctx.drawImage(backgroundImage, offsetX, offsetY, drawWidth, drawHeight);
            } else {
                ctx.fillStyle = "#87CEEB";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#32CD32";
                ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
            }

            // Rysowanie postaci
            let imageToDraw;
            let isLoaded;

            if (player.isMoving) {
                imageToDraw = playerWalkFrames[player.currentFrameIndex];
                isLoaded = imageToDraw && imageToDraw.complete && imageToDraw.naturalWidth > 0;
            } else {
                imageToDraw = playerIdleImage;
                isLoaded = playerIdleImage.complete && playerIdleImage.naturalWidth > 0;
            }

            if (isLoaded && player.width > 0 && player.height > 0) {
                ctx.drawImage(imageToDraw, player.x, player.y, player.width, player.height);
            } else {
                let tempHeight = player.height || 150;
                let tempWidth = player.width || 80;
                ctx.fillStyle = "#4682B4";
                ctx.fillRect(player.x + (tempWidth*0.1), player.y + (tempHeight*0.3), tempWidth * 0.8, tempHeight * 0.7);
                ctx.fillStyle = "#FFC0CB";
                ctx.fillRect(player.x + (tempWidth*0.2), player.y, tempWidth * 0.6, tempHeight * 0.3);
            }

            // Rysowanie spadających przedmiotów
            fallingItems.forEach(item => {
                if (item.type === 'orange') {
                    if (orangeImage.complete && orangeImage.naturalWidth > 0) {
                        ctx.drawImage(orangeImage, item.x, item.y, item.width, item.height);
                    } else {
                        ctx.fillStyle = "#FFA500";
                        ctx.beginPath();
                        ctx.arc(item.x + item.width/2, item.y + item.height/2, item.width/2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (item.type === 'leaf') {
                    if (item.img && item.img.complete && item.img.naturalWidth > 0) {
                        ctx.drawImage(item.img, item.x, item.y, item.width, item.height);
                    } else {
                        ctx.fillStyle = "#8B4513"; 
                        ctx.beginPath();
                        ctx.moveTo(item.x + item.width/2, item.y);
                        ctx.lineTo(item.x + item.width, item.y + item.height);
                        ctx.lineTo(item.x, item.y + item.height);
                        ctx.fill();
                    }
                }
            });
        }

        function gameLoop(timestamp) {
            if(!gameRunning) return; 
            
            let deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            if (deltaTime > 100) deltaTime = 16; 

            update(deltaTime);
            draw();
            
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
